name: Daily CEO Stories Philippines

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # 6 PM Philippine Time (PHT = UTC+8) = 10:00 UTC
    # Schedule 1 hr early (09:00 UTC) to compensate for GitHub Actions runner delay
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      story_seed:
        description: "Custom story seed (leave blank for trending)"
        required: false
        default: ""
      upload:
        description: "Upload to YouTube?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  generate-and-upload:
    name: Generate + Upload CEO Stories Video
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. System deps ───────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libfontconfig1 espeak-ng \
            fonts-liberation fonts-dejavu-core fonts-noto-core

      # ── 3b. Cache Kokoro model weights (~115 MB total, avoid re-downloading daily) ─
      - name: Cache Kokoro model
        uses: actions/cache@v4
        with:
          path: models/
          key: kokoro-82m-v1

      # ── 4. Python deps ───────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Write secret files ────────────────────────────────────────────────
      #
      # REQUIRED GitHub Secrets:
      #   OPENROUTER_API_KEY        — Primary OpenRouter key (required)
      #   OPENROUTER_API_KEY_2..10  — Additional keys for rotation (optional)
      #   PEXELS_API_KEY            — Pexels key for thumbnail face photos
      #   YOUTUBE_TOKEN_JSON        — Contents of your token.json (OAuth token)
      #   YOUTUBE_CREDENTIALS_JSON  — Contents of your credentials.json (OAuth client)
      #
      # OPTIONAL:
      #   TELEGRAM_BOT_TOKEN        — Telegram bot token for upload notifications
      #   TELEGRAM_CHAT_ID          — Telegram chat/channel ID for notifications
      #
      - name: Write YouTube credentials from secrets
        env:
          YOUTUBE_TOKEN_JSON:       ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
        run: |
          # Use printf to avoid bash echo mangling JSON special characters
          printf '%s' "$YOUTUBE_TOKEN_JSON"       > token.json
          printf '%s' "$YOUTUBE_CREDENTIALS_JSON" > credentials.json
          # Validate both files are valid JSON before proceeding
          python -c "import json,sys; json.load(open('token.json')); print('token.json OK')"
          python -c "import json,sys; json.load(open('credentials.json')); print('credentials.json OK')"

      # ── 6. Run pipeline ──────────────────────────────────────────────────────
      - name: Generate CEO success story video
        env:
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_KEY_2:  ${{ secrets.OPENROUTER_API_KEY_2 }}
          OPENROUTER_API_KEY_3:  ${{ secrets.OPENROUTER_API_KEY_3 }}
          OPENROUTER_API_KEY_4:  ${{ secrets.OPENROUTER_API_KEY_4 }}
          OPENROUTER_API_KEY_5:  ${{ secrets.OPENROUTER_API_KEY_5 }}
          OPENROUTER_API_KEY_6:  ${{ secrets.OPENROUTER_API_KEY_6 }}
          OPENROUTER_API_KEY_7:  ${{ secrets.OPENROUTER_API_KEY_7 }}
          OPENROUTER_API_KEY_8:  ${{ secrets.OPENROUTER_API_KEY_8 }}
          OPENROUTER_API_KEY_9:  ${{ secrets.OPENROUTER_API_KEY_9 }}
          OPENROUTER_API_KEY_10: ${{ secrets.OPENROUTER_API_KEY_10 }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          SEED="${{ github.event.inputs.story_seed }}"
          UPLOAD="${{ github.event.inputs.upload }}"

          # Scheduled runs: always upload
          if [ -z "$UPLOAD" ]; then UPLOAD="true"; fi

          ARGS=""
          if [ -n "$SEED" ]; then ARGS="--seed \"$SEED\""; fi
          if [ "$UPLOAD" = "false" ]; then ARGS="$ARGS --no-upload"; fi

          python main.py $ARGS

      # ── 7. Persist used seed + title lists ──────────────────────────────────────────────
      - name: Commit used_topics.json and used_titles.json
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git add used_topics.json used_titles.json || true
          git diff --cached --quiet || git commit -m "chore: update topic/title history [skip ci]"
          git push

      # ── 8. Save artifact ─────────────────────────────────────────────────────────────
      - name: Upload output artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drama-video-${{ github.run_number }}
          # Upload video, thumbnail, and script — NOT the full tts/ folder
          path: |
            output/**/drama_video.mp4
            output/**/thumbnail.png
            output/**/script.txt
            output/**/result.json
          retention-days: 7
